name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & offline tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.0 is the supported minimum; 3.3 is the current stable.
        ruby: ['3.0', '3.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Verify gemspec
        # `require` can't load a .gemspec (it only resolves .rb files), so
        # build the gem instead - this both parses and validates the gemspec.
        run: gem build mongreldb.gemspec

      # The offline unit tests (exception hierarchy, query-builder alias
      # translation, cells flattening, in-process auth/transport stubs) run
      # without a daemon. Live tests self-skip when no server binary is found.
      - name: Run tests
        run: bundle exec rake test

  live:
    # Boots a real mongreldb-server and runs the live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.60.3'
      # The test harness boots the daemon itself from ./bin/mongreldb-server.
      # MONGRELDB_SERVER points it at the downloaded binary.
      MONGRELDB_SERVER: ./bin/mongreldb-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1

      - name: Run live tests
        run: bundle exec rake test

      - name: Start mongreldb-server for examples
        run: |
          rm -rf /tmp/mongreldb-data-ex
          ./bin/mongreldb-server /tmp/mongreldb-data-ex --port 8453 > /tmp/mongreldb-server-ex.log 2>&1 &
          echo $! > /tmp/mongreldb-server-ex.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy for examples"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server-ex.log && exit 1)

      - name: Run examples
        run: |
          for ex in examples/*.rb; do
            echo "=== Running $ex ==="
            ruby -Ilib "$ex" || { echo "FAILED: $ex"; exit 1; }
          done

      - name: Stop mongreldb-server for examples
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server-ex.pid ]; then
            kill "$(cat /tmp/mongreldb-server-ex.pid)" 2>/dev/null || true
          fi

      - name: Dump server log on failure
        if: failure()
        run: |
          # The harness writes its server log to a temp file; print the most
          # recent one if present.
          log="$(ls -t /tmp/mongreldb-ruby-server-*.log 2>/dev/null | head -n 1)"
          if [ -n "$log" ]; then cat "$log"; fi
